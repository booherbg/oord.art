function genTrackName() {

// ── Utilities ──────────────────────────────────────────

function createNoise(dur) {
  const len = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function createImpulse(dur, decay) {
  const len = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

// ── Audio Init ─────────────────────────────────────────

function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -8; comp.ratio.value = 6; comp.knee.value = 12;
  comp.connect(ctx.destination);
  master = ctx.createGain();
  master.gain.value = volLevel;
  master.connect(comp);
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  master.connect(analyser);
}

// ── Parameter Generation ───────────────────────────────

const ROOTS = [36, 38, 41, 43, 45];
const NAMES = {36:'C minor',38:'D minor',41:'F minor',43:'G minor',45:'A minor'};
const PROGS = [
  {name:'Emotional',  deg:[0,8,3,10]},
  {name:'Anthemic',   deg:[0,3,10,8]},
  {name:'House',      deg:[0,3,5,0]},
  {name:'Dark',       deg:[0,10,8,7]},
  {name:'Ritual',     deg:[0,8,10,0]},
  {name:'Cathedral',  deg:[0,5,3,10]},
  {name:'Hymnal',     deg:[0,3,8,5]},
  {name:'Devotional', deg:[0,7,3,5]},
];

function genParams() {
  const root = pick(ROOTS);
  const prog = pick(PROGS);
  const bpm = Math.round(rand(118, 126));
  const beat = 60 / bpm;
  const bar = beat * 4;
  const chordRoots = prog.deg.map(d => root + d);
  const chordVoices = chordRoots.map(r => {
    const deg = ((r - root) % 12 + 12) % 12;
    const q = CHORD_Q[deg] || 'M';
    const b = r + 12;
    return q === 'm' ? [b, b+3, b+7] : [b, b+4, b+7];
  });
  const scaleNotes = MINOR_SCALE.map(s => root + s);
  const acidNotes = [...scaleNotes, ...scaleNotes.map(n => n + 12)];
  const acidPattern = genAcidPattern(acidNotes);
  const melody = genMelody(root);
  const acidWave = Math.random() < 0.5 ? 'square' : 'sawtooth';
  const acidQ = rand(10, 18);
  return {root, prog, bpm, beat, bar, chordRoots, chordVoices, acidPattern, melody, acidWave, acidQ};
}

function genAcidPattern(notes) {
  const pat = [];
  let prev = pick(notes.slice(2, 8));
  for (let i = 0; i < 16; i++) {
    if ((i === 7 || i === 15) && Math.random() < 0.35) {
      pat.push({note:0, accent:false, slide:false}); continue;
    }
    if (i === 3 && Math.random() < 0.25) {
      pat.push({note:0, accent:false, slide:false}); continue;
    }
    if (Math.random() < 0.12) {
      pat.push({note:0, accent:false, slide:false}); continue;
    }
    const nearby = notes.filter(n => Math.abs(n - prev) <= 5);
    const note = pick(nearby.length ? nearby : notes);
    prev = note;
    pat.push({
      note,
      accent: (i % 4 === 0 ? Math.random() < 0.55 : i % 4 === 2 ? Math.random() < 0.2 : Math.random() < 0.08),
      slide: Math.random() < 0.35
    });
  }
  let acc = pat.filter(p => p.accent).length;
  while (acc < 3) {
    const idx = [0,4,8,12][Math.floor(Math.random()*4)];
    if (pat[idx].note && !pat[idx].accent) { pat[idx].accent = true; acc++; }
  }
  let active = pat.filter(p => p.note).length;
  while (active < 10) {
    const idx = Math.floor(Math.random() * 16);
    if (!pat[idx].note) { pat[idx].note = pick(notes.slice(2,8)); active++; }
  }
  return pat;
}

function genMelody(root) {
  const penta = MINOR_PENTA.map(s => root + 24 + s);
  const allNotes = [...penta, ...penta.map(n => n + 12)];

  // Pre-designed hook contours — indices into allNotes (0-9)
  // Each is 8 eighth notes per bar. -1 = rest.
  // Designed for catchiness: repetition, direction, breathing room.
  const HOOKS = [
    [3,-1, 5, 3,-1, 4, 3,-1],    // bouncy anchor
    [5, 6,-1, 5, 4,-1, 3, 5],    // ascending arch
    [7, 6, 5,-1, 3, 4, 5,-1],    // descending catch
    [5,-1, 5, 7, 6,-1, 5,-1],    // rhythm with peak
    [3, 4, 5, 6,-1,-1, 5, 3],    // climbing release
    [6, 5, 6,-1, 7, 6,-1, 5],    // floating high
    [3, 3,-1, 5, 4, 3,-1,-1],    // rhythmic double
    [5, 7,-1, 6, 5,-1, 3,-1],    // drop hook
    [4, 5, 7,-1, 5, 4,-1, 3],    // wave
    [7,-1, 5, 7, 8,-1, 7, 5],    // bright peak
  ];

  const hook = pick(HOOKS);
  const bars = [];

  for (let c = 0; c < 4; c++) {
    const shift = [0, 1, -1, 0][c];
    const isResponse = (c % 2 === 1);

    const bar = hook.map((idx, i) => {
      if (idx === -1) return 0;
      let noteIdx = idx + shift;
      if (isResponse && (i === 2 || i === 5) && Math.random() < 0.4) {
        noteIdx += pick([-1, 1]);
      }
      noteIdx = Math.max(0, Math.min(allNotes.length - 1, noteIdx));
      return allNotes[noteIdx];
    });
    bars.push(bar);
  }

  return bars;
}

// ══════════════════════════════════════════════════════════
// BUILD SET — 64 bars, all transitions on 4-bar boundaries
//
// THE HUM        0-4    chamfer only
// THE PULSE      4-8    + kick (fade in), shaker whisper
// THE WAREHOUSE  8-16   + hats, claps, pad whisper
// THE FLOOR     16-24   + acid 303 (filter opening)
// THE BUILD     24-32   + bass, sub, melody
// THE PEAK      32-44   everything transcendent (12 bars)
// THE BREAK     44-48   drums out, pad swells, acid echoes
// THE RETURN    48-56   everything crashes back
// THE UNWIND    56-60   layers exit
// THE SILENCE   60-64   chamfer fading to nothing
// ══════════════════════════════════════════════════════════

function buildSet() {
  const p = genParams();
  const {beat, bar} = p;
  const t0 = ctx.currentTime + 1.5;
  const totalBars = 64;
  const T = totalBars * bar;
  const noiseBuf = createNoise(0.5);

  const reverb = ctx.createConvolver();
  reverb.buffer = createImpulse(2.0, 2.5);
  const rvbWet = ctx.createGain(); rvbWet.gain.value = 0.12;
  reverb.connect(rvbWet); rvbWet.connect(master);
  rvbSend = ctx.createGain(); rvbSend.gain.value = 1;
  rvbSend.connect(reverb);

  const ZD = [
    ['THE HUM',0,4],['THE PULSE',4,8],['THE WAREHOUSE',8,16],
    ['THE FLOOR',16,24],['THE BUILD',24,32],['THE PEAK',32,44],
    ['THE BREAK',44,48],['THE RETURN',48,56],
    ['THE UNWIND',56,60],['THE SILENCE',60,64]
  ];

  // Chamfer is tiny (3 nodes) and plays first — schedule immediately
  buildChamfer(t0, T, bar);

  // Stagger heavy builders across frames to avoid GC spikes / audio dropout
  const builders = [
    () => buildKicks(t0, bar, beat),
    () => buildHats(t0, bar, beat, noiseBuf),
    () => buildClaps(t0, bar, beat, noiseBuf),
    () => buildShaker(t0, bar, beat, noiseBuf),
    () => buildAcid(t0, bar, beat, p),
    () => buildBass(t0, bar, beat, p),
    () => buildPad(t0, bar, p),
    () => buildMelody(t0, bar, beat, p),
  ];
  builders.forEach((fn, i) => setTimeout(fn, i * 60));

  zones = ZD.map(([n,s,e]) => ({name:n, start:t0+s*bar, end:t0+e*bar}));

  document.getElementById('trackname').textContent = genTrackName();
  document.getElementById('info').textContent =
    `${NAMES[p.root]} · ${p.bpm} BPM · ${p.prog.name} · ${p.acidWave}`;

  setTimeout(() => {
    if (running) {
      running = false;
      document.getElementById('zone').textContent = '—';
      document.getElementById('replay').style.display = 'block';
      document.body.classList.remove('active');
    }
  }, T * 1000 + 800);
}

// ── CHAMFER ────────────────────────────────────────────

function buildChamfer(t0, T, bar) {
  const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = CHAMFER;
  const osc2 = ctx.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = CHAMFER * 2;
  const harm = ctx.createGain(); harm.gain.value = 0.15;
  const env = ctx.createGain();
  const g = env.gain;
  g.setValueAtTime(0, t0);
  g.linearRampToValueAtTime(0.12, t0 + 4*bar);
  g.linearRampToValueAtTime(0.08, t0 + 8*bar);
  g.linearRampToValueAtTime(0.03, t0 + 16*bar);
  g.setValueAtTime(0.03, t0 + 44*bar);
  g.linearRampToValueAtTime(0.06, t0 + 46*bar);
  g.linearRampToValueAtTime(0.03, t0 + 48*bar);
  g.setValueAtTime(0.03, t0 + 56*bar);
  g.linearRampToValueAtTime(0.10, t0 + 60*bar);
  g.linearRampToValueAtTime(0, t0 + T);
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.2;
  const lfoG = ctx.createGain(); lfoG.gain.value = 0.008;
  lfo.connect(lfoG); lfoG.connect(env.gain);
  osc.connect(env); osc2.connect(harm); harm.connect(env); env.connect(master);
  osc.start(t0); osc.stop(t0+T+1);
  osc2.start(t0); osc2.stop(t0+T+1);
  lfo.start(t0); lfo.stop(t0+T+1);
}

// ── KICKS — punchy, always with click transient ───────

function buildKicks(t0, bar, beat) {
  for (let b = 4; b < 60; b++) {
    if (b >= 44 && b < 48) continue;
    for (let i = 0; i < 4; i++) {
      const t = t0 + b*bar + i*beat;
      let vol = 0.75;
      if (b < 8) vol *= (b - 4 + i/4) / 4;
      if (b >= 56) vol *= Math.max(0, 1 - (b - 56 + i/4) / 4);
      if (vol <= 0.01) continue;

      const k = ctx.createOscillator(); k.type = 'sine';
      k.frequency.setValueAtTime(170, t);
      k.frequency.exponentialRampToValueAtTime(38, t + 0.055);
      const kg = ctx.createGain();
      kg.gain.setValueAtTime(vol, t);
      kg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      k.connect(kg); kg.connect(master);
      k.start(t); k.stop(t + 0.25);

      const cl = ctx.createOscillator(); cl.type = 'triangle'; cl.frequency.value = 4000;
      const cg = ctx.createGain();
      cg.gain.setValueAtTime(vol * 0.15, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.006);
      cl.connect(cg); cg.connect(master);
      cl.start(t); cl.stop(t + 0.015);
    }
  }
}

// ── HATS — crisp, defined offbeats ────────────────────

function buildHats(t0, bar, beat, noiseBuf) {
  for (let b = 8; b < 56; b++) {
    if (b >= 44 && b < 48) continue;
    for (let e = 0; e < 8; e++) {
      const t = t0 + b*bar + e*(beat/2);
      const off = e % 2 === 1;
      let vol;
      if (b < 16) { if (!off) continue; vol = 0.09; }
      else if (b < 32) { vol = off ? 0.12 : 0.05; }
      else { vol = off ? 0.14 : 0.07; }
      if (b >= 52) vol *= Math.max(0.15, 1 - (b - 52) / 4);
      if (vol <= 0.005) continue;

      const src = ctx.createBufferSource(); src.buffer = noiseBuf;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 9500;
      const g = ctx.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
      src.connect(hp); hp.connect(g); g.connect(master);
      src.start(t); src.stop(t + 0.045);
    }
  }
}

// ── CLAPS — beats 2 & 4, layered ─────────────────────

function buildClaps(t0, bar, beat, noiseBuf) {
  for (let b = 8; b < 56; b++) {
    if (b >= 44 && b < 48) continue;
    let vol = 0.16;
    if (b < 16) vol = 0.12;
    if (b >= 52) vol *= Math.max(0.15, 1 - (b - 52) / 4);
    for (const bi of [1, 3]) {
      const t = t0 + b*bar + bi*beat;
      for (let layer = 0; layer < 3; layer++) {
        const off = layer * 0.007;
        const src = ctx.createBufferSource(); src.buffer = noiseBuf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 1200 + layer*400; bp.Q.value = 1.5;
        const g = ctx.createGain();
        g.gain.setValueAtTime(vol, t+off);
        g.gain.exponentialRampToValueAtTime(0.001, t+off+0.11);
        src.connect(bp); bp.connect(g); g.connect(master);
        src.start(t+off); src.stop(t+off+0.15);
      }
    }
  }
}

// ── SHAKER — 16th-note texture ────────────────────────

function buildShaker(t0, bar, beat, noiseBuf) {
  const sixteenth = beat / 4;
  for (let b = 4; b < 56; b++) {
    if (b >= 44 && b < 48) continue;
    for (let step = 0; step < 16; step++) {
      const t = t0 + b*bar + step*sixteenth;
      let vol = (step % 4 === 0) ? 0.025 : 0.01;
      if (b < 8) vol *= 0.4;
      if (b >= 52) vol *= Math.max(0, 1 - (b - 52) / 4);
      if (vol <= 0.003) continue;

      const src = ctx.createBufferSource(); src.buffer = noiseBuf;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 11000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
      src.connect(hp); hp.connect(g); g.connect(master);
      src.start(t); src.stop(t + 0.035);
    }
  }
}

// ── ACID 303 — with dotted-eighth delay ───────────────

function buildAcid(t0, bar, beat, p) {
  const sixteenth = beat / 4;
  const acidStart = t0 + 16*bar;
  const acidEnd = t0 + 60*bar;

  const sub = ctx.createGain();
  const sg = sub.gain;
  sg.setValueAtTime(0.001, acidStart);
  sg.linearRampToValueAtTime(0.4, acidStart + 4*bar);
  sg.setValueAtTime(0.35, t0 + 24*bar);
  sg.linearRampToValueAtTime(0.28, t0 + 32*bar);
  sg.setValueAtTime(0.28, t0 + 43.9*bar);
  sg.linearRampToValueAtTime(0.06, t0 + 44*bar);
  sg.setValueAtTime(0.06, t0 + 48*bar);
  sg.linearRampToValueAtTime(0.35, t0 + 52*bar);
  sg.setValueAtTime(0.35, t0 + 56*bar);
  sg.linearRampToValueAtTime(0.001, acidEnd);
  sub.connect(master);

  const osc = ctx.createOscillator(); osc.type = p.acidWave;
  osc.frequency.value = mtf(p.acidPattern[0].note || p.root);
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 200; filt.Q.value = p.acidQ;
  const noteG = ctx.createGain(); noteG.gain.value = 0;

  const acidDel = ctx.createDelay(1.0);
  acidDel.delayTime.value = beat * 0.75;
  const acidDelFb = ctx.createGain(); acidDelFb.gain.value = 0.3;
  const acidDelWet = ctx.createGain();
  acidDelWet.gain.setValueAtTime(0, t0);
  acidDelWet.gain.linearRampToValueAtTime(0.2, acidStart + 8*bar);
  acidDelWet.gain.setValueAtTime(0.2, t0 + 44*bar);
  acidDelWet.gain.linearRampToValueAtTime(0.35, t0 + 45*bar);
  acidDelWet.gain.setValueAtTime(0.35, t0 + 48*bar);
  acidDelWet.gain.linearRampToValueAtTime(0.2, t0 + 50*bar);
  const acidDelLpf = ctx.createBiquadFilter();
  acidDelLpf.type = 'lowpass'; acidDelLpf.frequency.value = 1500;

  osc.connect(filt); filt.connect(noteG); noteG.connect(sub);
  noteG.connect(acidDel);
  acidDel.connect(acidDelLpf); acidDelLpf.connect(acidDelFb); acidDelFb.connect(acidDel);
  acidDelLpf.connect(acidDelWet); acidDelWet.connect(master);
  osc.start(acidStart); osc.stop(acidEnd + 2);

  function filterBase(b) {
    if (b < 16) return 200;
    if (b < 44) return 200 * Math.pow(3500/200, (b - 16) / 28);
    if (b < 48) return 250;
    if (b < 56) return 300 + (b - 48) / 8 * 2700;
    return Math.max(200, 3000 * (1 - (b - 56) / 4));
  }

  for (let b = 16; b < 60; b++) {
    for (let step = 0; step < 16; step++) {
      const t = t0 + b*bar + step*sixteenth;
      const pat = p.acidPattern[step];
      if (!pat.note) { noteG.gain.setValueAtTime(0.001, t); continue; }

      const freq = mtf(pat.note);
      if (pat.slide) osc.frequency.linearRampToValueAtTime(freq, t + sixteenth*0.8);
      else osc.frequency.setValueAtTime(freq, t);

      const fBase = filterBase(b + step/16);
      const fPeak = pat.accent ? fBase + 2500 : fBase + 800;
      filt.frequency.setValueAtTime(Math.min(fPeak, 5000), t);
      filt.frequency.exponentialRampToValueAtTime(Math.max(40, fBase), t + sixteenth*2.5);

      const aPeak = (b >= 44 && b < 48) ? 0.15 : pat.accent ? 0.7 : 0.4;
      noteG.gain.setValueAtTime(aPeak, t);
      if (!pat.slide) {
        noteG.gain.setValueAtTime(aPeak, t + sixteenth*0.75);
        noteG.gain.linearRampToValueAtTime(0.01, t + sixteenth*0.95);
      }
    }
  }
}

// ── BASS — heavy sub, sidechain pump, rolling octaves ─

function buildBass(t0, bar, beat, p) {
  const bassStart = t0 + 24*bar;
  const bassEnd = t0 + 56*bar;

  const sub = ctx.createGain();
  const sg = sub.gain;
  sg.setValueAtTime(0.001, bassStart);
  sg.linearRampToValueAtTime(1, bassStart + 2*bar);
  sg.setValueAtTime(1, t0 + 43.9*bar);
  sg.linearRampToValueAtTime(0.001, t0 + 44*bar);
  sg.setValueAtTime(0.001, t0 + 48*bar);
  sg.linearRampToValueAtTime(1, t0 + 51*bar);
  sg.setValueAtTime(1, t0 + 52*bar);
  sg.linearRampToValueAtTime(0.001, bassEnd);
  sub.connect(master);

  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  const osc2 = ctx.createOscillator(); osc2.type = 'square';
  const octG = ctx.createGain(); octG.gain.value = 0.25;
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 600; filt.Q.value = 4;
  const bassG = ctx.createGain(); bassG.gain.value = 0;
  const subOsc = ctx.createOscillator(); subOsc.type = 'sine';
  const subG = ctx.createGain(); subG.gain.value = 0;

  osc.connect(filt); osc2.connect(octG); octG.connect(filt);
  filt.connect(bassG); bassG.connect(sub);
  subOsc.connect(subG); subG.connect(sub);

  osc.start(bassStart); osc.stop(bassEnd+0.5);
  osc2.start(bassStart); osc2.stop(bassEnd+0.5);
  subOsc.start(bassStart); subOsc.stop(bassEnd+0.5);

  for (let b = 24; b < 56; b++) {
    if (b >= 44 && b < 48) continue;
    const ci = Math.floor(((b - 24) % 8) / 2) % 4;
    const rootFreq = mtf(p.chordRoots[ci]);

    if ((b - 24) % 2 === 0) {
      const bt = t0 + b*bar;
      osc.frequency.setValueAtTime(rootFreq, bt);
      osc2.frequency.setValueAtTime(rootFreq * 2, bt);
      subOsc.frequency.setValueAtTime(rootFreq / 2, bt);
    }

    for (let i = 0; i < 4; i++) {
      const t = t0 + b*bar + i*beat;
      bassG.gain.setValueAtTime(0.03, t);
      bassG.gain.exponentialRampToValueAtTime(0.75, t + beat*0.65);
      subG.gain.setValueAtTime(0.02, t);
      subG.gain.exponentialRampToValueAtTime(0.5, t + beat*0.65);
      const fOpen = (i % 2 === 1) ? 1400 : 600;
      filt.frequency.setValueAtTime(fOpen, t);
      filt.frequency.exponentialRampToValueAtTime(400, t + beat*0.9);
    }

    for (const eighth of [3, 7]) {
      const t = t0 + b*bar + eighth*(beat/2);
      osc.frequency.setValueAtTime(rootFreq * 2, t);
      osc.frequency.setValueAtTime(rootFreq, t + beat/2);
      osc2.frequency.setValueAtTime(rootFreq * 4, t);
      osc2.frequency.setValueAtTime(rootFreq * 2, t + beat/2);
    }
  }
}

// ── PAD ────────────────────────────────────────────────

function buildPad(t0, bar, p) {
  const padEnd = t0 + 64*bar;
  for (let b = 8; b < 64; b += 2) {
    const ci = Math.floor(((b - 8) % 8) / 2) % 4;
    const voices = p.chordVoices[ci];
    const cStart = t0 + b*bar;
    const cDur = Math.min(2*bar, padEnd - cStart);
    if (cDur <= 0) continue;

    const progress = (b - 8) / 56;
    let vol = 0.008 + progress * 0.04;
    if (b >= 44 && b < 48) vol *= 2.0;
    if (b >= 56) vol *= Math.max(0, 1 - (b - 56) / 8);

    for (const midi of voices) {
      const freq = mtf(midi);
      for (const det of [-5, 0, 5]) {
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.value = freq; o.detune.value = det;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, cStart);
        g.gain.linearRampToValueAtTime(vol, cStart + 0.5);
        g.gain.setValueAtTime(vol, cStart + cDur - 0.5);
        g.gain.linearRampToValueAtTime(0, cStart + cDur);
        o.connect(g); g.connect(master);
        o.start(cStart); o.stop(cStart + cDur + 0.5);
      }
    }
  }
}

// ── MELODY — sticky, with dotted-quarter delay ────────

function buildMelody(t0, bar, beat, p) {
  const melStart = t0 + 24*bar;
  const melEnd = t0 + 60*bar;

  const delay = ctx.createDelay(2);
  delay.delayTime.value = beat * 1.5;
  const fb = ctx.createGain();
  const dFilt = ctx.createBiquadFilter();
  dFilt.type = 'lowpass'; dFilt.frequency.value = 2000;
  delay.connect(dFilt); dFilt.connect(fb); fb.connect(delay);
  delay.connect(master);

  fb.gain.setValueAtTime(0.3, melStart);
  fb.gain.setValueAtTime(0.5, t0 + 44*bar);
  fb.gain.setValueAtTime(0.3, t0 + 48*bar);
  fb.gain.setValueAtTime(0.4, t0 + 56*bar);

  const melSub = ctx.createGain();
  melSub.gain.setValueAtTime(0.001, melStart);
  melSub.gain.linearRampToValueAtTime(0.22, melStart + bar);
  melSub.gain.setValueAtTime(0.22, t0 + 32*bar);
  melSub.gain.linearRampToValueAtTime(0.30, t0 + 34*bar);
  melSub.gain.setValueAtTime(0.30, t0 + 43.5*bar);
  melSub.gain.linearRampToValueAtTime(0.10, t0 + 44.5*bar);
  melSub.gain.setValueAtTime(0.10, t0 + 48*bar);
  melSub.gain.linearRampToValueAtTime(0.32, t0 + 51*bar);
  melSub.gain.setValueAtTime(0.32, t0 + 56*bar);
  melSub.gain.linearRampToValueAtTime(0.001, melEnd);
  melSub.connect(master);
  melSub.connect(delay);
  if (rvbSend) melSub.connect(rvbSend);

  for (let b = 24; b < 60; b++) {
    const ci = Math.floor(((b - 24) % 8) / 2) % 4;
    const notes = p.melody[ci];
    for (let s = 0; s < 8; s++) {
      const midi = notes[s];
      if (!midi) continue;
      const t = t0 + b*bar + s*(beat/2);
      const freq = mtf(midi);
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3500;
      const g = ctx.createGain();
      const vel = (s === 0 || s === 4) ? 0.65 : 0.4;
      g.gain.setValueAtTime(vel, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + beat*0.9);
      o.connect(lp); lp.connect(g); g.connect(melSub);
      o.start(t); o.stop(t + beat);
    }
  }
}

// ── Waveform Visualizer ────────────────────────────────

function drawWaveform() {
  if (!running) return;
  animId = requestAnimationFrame(drawWaveform);
  const canvas = document.getElementById('wv');
  const c = canvas.getContext('2d');
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  c.clearRect(0, 0, canvas.width, canvas.height);
  c.strokeStyle = 'rgba(232, 144, 32, 0.4)';
  c.lineWidth = 1.5;
  c.beginPath();
  const step = canvas.width / data.length;
  for (let i = 0; i < data.length; i++) {
    const y = (data[i] / 128) * canvas.height / 2;
    if (i === 0) c.moveTo(0, y); else c.lineTo(i * step, y);
  }
  c.stroke();
}

function resizeCanvas() {
  const canvas = document.getElementById('wv');
  canvas.width = window.innerWidth;
  canvas.height = 80;
}

// ── Zone UI Updater ────────────────────────────────────

function updateZone() {
  if (!running || !ctx) return;
  requestAnimationFrame(updateZone);
  const now = ctx.currentTime;
  const zone = zones.find(z => now >= z.start && now < z.end);
  if (zone) {
    const el = document.getElementById('zone');
    if (el.textContent !== zone.name) el.textContent = zone.name;
  }
}

// ── Controls ───────────────────────────────────────────

function setVol(v, btn) {
  volLevel = v;
  if (master) {
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(v, ctx.currentTime + 0.3);
  }
  document.querySelectorAll('#controls button:not(.stop)').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
}

function stopMusic() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  if (ctx) { ctx.close(); ctx = null; }
  document.getElementById('zone').textContent = '—';
  document.getElementById('replay').style.display = 'block';
  document.body.classList.remove('active');
  document.getElementById('wv').classList.remove('visible');
}

function startMusic() {
  if (ctx) { try { ctx.close(); } catch(e){} }
  initAudio();
  ctx.resume().then(() => {
    running = true;
    document.body.classList.add('active');
    document.getElementById('replay').style.display = 'none';
    document.getElementById('ui').classList.add('visible');
    document.getElementById('controls').classList.add('visible');
    document.getElementById('wv').classList.add('visible');
    resizeCanvas();
    buildSet();
    drawWaveform();
    updateZone();
  });
}

// ── Init ───────────────────────────────────────────────

window.addEventListener('resize', resizeCanvas);

document.getElementById('gate').addEventListener('click', function() {
  this.classList.add('gone');
  // Create and resume AudioContext immediately inside the user gesture
  // — browsers block autoplay if ctx is created in a setTimeout
  if (ctx) { try { ctx.close(); } catch(e){} }
  initAudio();
  ctx.resume().then(() => {
    setTimeout(() => {
      running = true;
      document.body.classList.add('active');
      document.getElementById('replay').style.display = 'none';
      document.getElementById('ui').classList.add('visible');
      document.getElementById('controls').classList.add('visible');
      document.getElementById('wv').classList.add('visible');
      resizeCanvas();
      buildSet();
      drawWaveform();
      updateZone();
    }, 800);
  });
});
</script>
