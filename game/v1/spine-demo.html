<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PILGRIM'S PATH — Spine Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #07050a;
    --bg2:      #100d16;
    --orange:   #E86010;
    --yellow:   #D4A820;
    --violet:   #6020C0;
    --pink:     #D04870;
    --green:    #304830;
    --text:     #C8BCA8;
    --text-dim: #6A6058;
    --text-bright: #E8DCC8;
    --border:   #201818;
    --border-warm: #3A2818;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRAIN ─────────────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
  }

  /* ─── LAYOUT ────────────────────────────────────── */
  .wrap {
    max-width: 580px;
    margin: 0 auto;
    padding: 0 20px 120px;
    position: relative;
    z-index: 1;
  }

  /* ─── HEADER ────────────────────────────────────── */
  .site-header {
    text-align: center;
    padding: 48px 0 20px;
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 10vw, 64px);
    line-height: 0.9;
    color: var(--orange);
    letter-spacing: 0.04em;
    text-shadow: 0 0 40px rgba(232, 96, 16, 0.3);
  }

  .site-title span {
    display: block;
    color: var(--yellow);
    font-size: 0.55em;
    letter-spacing: 0.12em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), var(--yellow), transparent);
    margin: 20px 0;
    opacity: 0.25;
  }

  /* ─── TEMPERATURE GLOW ──────────────────────────── */
  .temp-cold .wrap { text-shadow: 0 0 80px rgba(100, 140, 200, 0.03); }
  .temp-cool .wrap { text-shadow: 0 0 80px rgba(140, 160, 190, 0.02); }
  .temp-warm .wrap { text-shadow: 0 0 80px rgba(232, 96, 16, 0.03); }
  .temp-hot  .wrap { text-shadow: 0 0 80px rgba(232, 60, 10, 0.05); }

  .temp-cold .node-card { border-color: #1a2030; }
  .temp-cool .node-card { border-color: #1e1e28; }
  .temp-warm .node-card { border-color: var(--border-warm); }
  .temp-hot  .node-card { border-color: #4a2010; }

  /* ─── NODE ──────────────────────────────────────── */
  .node-card {
    border: 1px solid var(--border-warm);
    border-radius: 2px;
    padding: 28px 24px;
    margin-top: 24px;
    background: rgba(14, 11, 18, 0.8);
    animation: nodeIn 0.6s ease;
  }

  @keyframes nodeIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .node-id {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    opacity: 0.6;
  }

  /* ─── ARRIVAL VARIANT ───────────────────────────── */
  .arrival {
    color: var(--yellow);
    font-style: italic;
    font-size: 12px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(212, 168, 32, 0.1);
    opacity: 0;
    animation: arrivalIn 0.5s ease 0.3s forwards;
  }

  @keyframes arrivalIn {
    to { opacity: 1; }
  }

  /* ─── BODY TEXT ─────────────────────────────────── */
  .node-text p {
    margin-bottom: 14px;
    opacity: 0;
    animation: textIn 0.5s ease forwards;
  }

  .node-text p:last-child { margin-bottom: 0; }

  @keyframes textIn {
    to { opacity: 1; }
  }

  /* ─── CONDITIONAL TEXT ──────────────────────────── */
  .conditional {
    color: var(--text-bright);
    font-size: 12px;
    margin-top: 14px;
    padding-left: 12px;
    border-left: 2px solid var(--violet);
    opacity: 0;
    animation: condIn 0.4s ease 0.8s forwards;
  }

  @keyframes condIn {
    to { opacity: 0.85; }
  }

  /* ─── OOR ACTION ────────────────────────────────── */
  .oor-action {
    font-style: italic;
    font-size: 12px;
    color: var(--orange);
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(232, 96, 16, 0.04);
    border-left: 2px solid var(--orange);
    opacity: 0;
    animation: oorIn 0.5s ease 0.6s forwards;
  }

  @keyframes oorIn {
    to { opacity: 0.7; }
  }

  /* ─── CHOICES ───────────────────────────────────── */
  .choices {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    animation: choicesIn 0.4s ease 1s forwards;
  }

  @keyframes choicesIn {
    to { opacity: 1; }
  }

  .choice-btn {
    background: none;
    border: 1px solid var(--border-warm);
    border-radius: 2px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .choice-btn:hover {
    background: rgba(232, 96, 16, 0.06);
    border-color: var(--orange);
    color: var(--text-bright);
  }

  .choice-btn:active {
    background: rgba(232, 96, 16, 0.12);
  }

  /* ─── STATE DEBUG ───────────────────────────────── */
  .state-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(7, 5, 10, 0.95);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    backdrop-filter: blur(8px);
  }

  .state-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .state-tag {
    padding: 2px 6px;
    border-radius: 2px;
    background: rgba(232, 96, 16, 0.1);
    color: var(--orange);
    text-transform: uppercase;
    font-size: 8px;
    letter-spacing: 0.15em;
  }

  .state-temp {
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .temp-cold .state-temp { color: #6090C0; }
  .temp-cool .state-temp { color: #8090A0; }
  .temp-warm .state-temp { color: var(--orange); }
  .temp-hot  .state-temp { color: #E03010; }

  .restart-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  /* ─── TERMINAL ──────────────────────────────────── */
  .terminal-msg {
    margin-top: 28px;
    padding: 20px;
    border: 1px solid var(--violet);
    border-radius: 2px;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    opacity: 0;
    animation: condIn 0.5s ease 0.8s forwards;
  }

  .terminal-msg span {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--violet);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
</style>
</head>
<body class="temp-cold">

<div class="wrap">
  <header class="site-header">
    <div class="site-title">The Pilgrim's<span>Path</span></div>
    <div class="divider"></div>
  </header>
  <div id="game"></div>
</div>

<div class="state-bar">
  <div>
    <span class="state-temp" id="temp-display">cold</span>
  </div>
  <div class="state-tags" id="tag-display"></div>
  <button class="restart-btn" onclick="restart()">Restart</button>
</div>

<script>
// ─── NODES ─────────────────────────────────────────
const NODES = [
  {
    id: "spine_001",
    text: "You said you'd go — not because you were sure you wanted to, but because saying yes was easier than explaining a no. So now you're in the long approach — the minutes between the self that thumbs emojis and the self that has to show up and be real. The sidewalk keeps a whisper of the day's heat; the night air above it is cooler, softer, almost conversational, as if the city decided to meet you halfway.\n\nBetween the bright streets the block gets honest: dumpsters settling, a flyer catching on your laces until it rips free, taxis sliding past with their windows cracked and scraps of other people's songs tossed out into the damp. If you're going to like anything about tonight, you tell yourself it's this — the texture, the unpolished edges, the way ordinary life insists on being itself even when you're not sure you are.\n\nThen the bass finds you. Not as a tune you can hum — as pressure in your ribs before your mind gets a vote. No hook. No story yet. Just weight rolling down the block like weather, and your feet adjusting because bodies are honest about gradients long before you are.\n\nYou slip between buildings. Sodium light smears the fog the color of old apricots. The alley tightens; gravel pops under your shoes, small stubborn sounds that feel almost kind in all this noise.",
    arrival_variants: null,
    conditional_text: null,
    oor_action: null,
    temperature: "cold",
    choices: [
      { text: "Follow the bass.", next: "spine_002", tag: "drawn", requires: null },
      { text: "You didn't choose this direction. You're just walking.", next: "spine_002", tag: "drifting", requires: null }
    ],
    terminal: false
  },
  {
    id: "spine_002",
    text: "The building is there before you find it. You were walking toward it and it was already behind you — you passed it without registering it and now you are standing at its mouth, turned around, facing a doorway that is open the way a jaw is open when the tendons have given out.\n\nWarm air pushes through the gap. It smells like sweat and electricity and something underneath both that your lungs recognize before your brain does. The bass is not louder here. It is closer. The distinction matters and you do not yet understand why.\n\nYou step across the threshold. The cold peels off you like a wet shirt.",
    arrival_variants: [
      { requires: { has_tag: "drawn" }, text: "You followed the sound here. You thought you were choosing. The building disagrees." },
      { default: true, text: "You arrived. You are not confident of the route you took." }
    ],
    conditional_text: null,
    oor_action: null,
    temperature: "cool",
    choices: [
      { text: "The warmth is immediate. Your body wants this.", next: "spine_003", tag: "willing", requires: null },
      { text: "Something is wrong with this building. You go in anyway.", next: "spine_003", tag: "wary", requires: null }
    ],
    terminal: false
  },
  {
    id: "spine_003",
    text: "The room is larger than the building should allow. The ceiling disappears into dark. Two hundred bodies occupy the floor and the boundary between them is softening — you can see it from the edge, the way individual movement bleeds into coordination, shoulders synchronizing without signal.\n\nAt the center, behind a pair of decks, something is wrong.\n\nIt is bright — orange and yellow, furred or fibrous, larger than a person. A mouth gapes at its center and tongue-limbs emerge from inside it, moving across the mixer with mechanical precision. Above, a single massive ear tilts toward the crowd. Eyes stud the surface — misaligned, tracking different things. One of them has already found you.",
    arrival_variants: [
      { requires: { has_tag: "willing" }, text: "The heat is thick and close. Your skin adjusts before your eyes do." },
      { requires: { has_tag: "wary" }, text: "The warmth does not reassure you. It is too deliberate. It is not the crowd's heat — it has a source." },
      { default: true, text: "Inside. The sound has architecture now." }
    ],
    conditional_text: null,
    oor_action: "OOR adjusts a low-pass filter. The air pressure in the room shifts. Three people near the front stop talking mid-sentence and begin to move.",
    temperature: "warm",
    choices: [
      { text: "Move closer.", next: "spine_004", tag: "approaching", requires: null },
      { text: "Watch from the edge.", next: "spine_004", tag: "observing", requires: null }
    ],
    terminal: false
  },
  {
    id: "spine_004",
    text: "The longer you watch, the less it looks like a performance. The tongue-limbs are not mixing for the crowd. They are mixing the crowd. Each adjustment changes something in the room — a filter sweep and the dance floor contracts. A bass drop and six people gasp simultaneously, mouths the same shape, necks arched at the same angle.\n\nIt is not playing music. It is operating equipment. The crowd is raw material. The music is a tool — a drill bit, a solvent, something that loosens what it touches so the valuable thing inside can be extracted.\n\nThe floor vibrates from underneath. Not from the subwoofers. From below the concrete. The bass originates in a direction your inner ear was not built to name, and OOR is tuning the room to match it.",
    arrival_variants: [
      { requires: { has_tag: "approaching" }, text: "You are close enough now to see the tongue-limbs flex at the knuckle joints. The motion is peristaltic." },
      { requires: { has_tag: "observing" }, text: "From the edge you can see more than you want to. The patterns in the crowd are too regular. The synchronization is not voluntary." },
      { default: true, text: "You are watching something you were not meant to see the mechanics of." }
    ],
    conditional_text: [
      { condition: { has_tag: "wary" }, append: "Your instinct was right. You knew it at the door. The wrongness was not the building. It was the purpose the building is being put to." }
    ],
    oor_action: "OOR's ear rotates twelve degrees toward the south wall. Something there has reached a useful density. It makes a correction on the low end. The group near the south wall moves harder. They do not know they were corrected.",
    temperature: "warm",
    choices: [
      { text: "This is what it is.", next: "spine_005", tag: "accepts", requires: null },
      { text: "This can't be what it looks like.", next: "spine_005", tag: "denies", requires: null }
    ],
    terminal: false
  },
  {
    id: "spine_005",
    text: "The room is asking you a question. Not in language. In temperature, in pressure, in the way the bass enters your body through your feet and leaves through the crown of your skull.\n\nYou can feel the crowd behind you — not as individuals but as a field. A warmth that has weight and direction. It wants you the way a current wants a river stone: not personally, not urgently, but with the slow inevitability of gradient.\n\nThe door is still behind you. The cold is still outside. You can feel it along the back of your neck — offering the alley, the sodium lights, the walk home. A life in which tonight was just a night.",
    arrival_variants: [
      { requires: { has_tag: "accepts" }, text: "You accepted what you saw. Acceptance does not make it easier. It makes it real." },
      { requires: { has_tag: "denies" }, text: "You told yourself it couldn't be what it looked like. Your body disagrees. Your body has been listening to the bass since the alley." },
      { default: true, text: "Something is about to happen. You feel it the way you feel weather changing — in the pressure, in the joints." }
    ],
    conditional_text: [
      { condition: { has_tag: "drawn" }, append: "The thing that pulled you here is still pulling. It has not stopped. It will not stop until you give it what it brought you here to give." },
      { condition: { has_tag: "drifting" }, append: "You have been drifting since the alley. The current is stronger here. It is harder to pretend you are not in it." }
    ],
    oor_action: "OOR does not look at you. OOR has never looked at you. The eye that tracked you was not looking — it was measuring.",
    temperature: "warm",
    choices: [
      { text: "Step into the crowd. Let the bass take you.", next: null, tag: "surrenders", requires: null },
      { text: "The door. The cold. The walk home.", next: null, tag: "withdraws", requires: null }
    ],
    terminal: true
  }
];

// ─── ENGINE ────────────────────────────────────────
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

let state = {
  node: "spine_001",
  tags: [],
  transcendentals: [],
  artifacts: [],
  run_artifacts: []
};

function evaluate(condition, st) {
  if (!condition) return true;
  if (condition.has_artifact)       return st.artifacts.includes(condition.has_artifact);
  if (condition.has_transcendental) return st.transcendentals.includes(condition.has_transcendental);
  if (condition.has_tag)            return st.tags.includes(condition.has_tag);
  if (condition.run_has_artifact)   return st.run_artifacts.includes(condition.run_has_artifact);
  return true;
}

function getArrival(node) {
  if (!node.arrival_variants) return null;
  for (const v of node.arrival_variants) {
    if (v.default) continue;
    if (evaluate(v.requires, state)) return v.text;
  }
  const def = node.arrival_variants.find(v => v.default);
  return def ? def.text : null;
}

function getConditionals(node) {
  if (!node.conditional_text) return [];
  return node.conditional_text.filter(c => evaluate(c.condition, state)).map(c => c.append);
}

function getChoices(node) {
  return node.choices.filter(c => evaluate(c.requires, state));
}

function render() {
  const node = nodeMap[state.node];
  if (!node) return;

  // temperature class on body
  document.body.className = 'temp-' + (node.temperature || 'cold');
  document.getElementById('temp-display').textContent = node.temperature || 'cold';

  // tags display
  const tagDisplay = document.getElementById('tag-display');
  tagDisplay.innerHTML = state.tags.map(t => `<span class="state-tag">${t}</span>`).join('');

  const container = document.getElementById('game');
  let html = `<div class="node-card">`;
  html += `<div class="node-id">${node.id}</div>`;

  // arrival variant
  const arrival = getArrival(node);
  if (arrival) {
    html += `<div class="arrival">${arrival}</div>`;
  }

  // body text — split on double newlines into paragraphs
  const paragraphs = node.text.split('\n\n');
  html += `<div class="node-text">`;
  paragraphs.forEach((p, i) => {
    html += `<p style="animation-delay:${0.15 + i * 0.15}s">${p}</p>`;
  });
  html += `</div>`;

  // conditional text
  const conds = getConditionals(node);
  conds.forEach(c => {
    html += `<div class="conditional">${c}</div>`;
  });

  // oor action
  if (node.oor_action) {
    html += `<div class="oor-action">${node.oor_action}</div>`;
  }

  // choices or terminal
  if (node.terminal) {
    const choices = getChoices(node);
    html += `<div class="choices">`;
    choices.forEach(c => {
      html += `<button class="choice-btn" onclick="terminalChoice('${c.tag}')">${c.text}</button>`;
    });
    html += `</div>`;
  } else {
    const choices = getChoices(node);
    html += `<div class="choices">`;
    choices.forEach(c => {
      html += `<button class="choice-btn" onclick="choose('${c.next}','${c.tag}')">${c.text}</button>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function choose(nextId, tag) {
  if (tag) state.tags.push(tag);
  state.node = nextId;
  render();
}

function terminalChoice(tag) {
  if (tag) state.tags.push(tag);
  // update tag display
  document.getElementById('tag-display').innerHTML = state.tags.map(t => `<span class="state-tag">${t}</span>`).join('');
  // show terminal
  const container = document.getElementById('game');
  const label = tag === 'surrenders' ? 'The crowd takes you.' : 'You leave.';
  const msg = tag === 'surrenders'
    ? 'End of spine. Branches begin here — Unity, Beauty, Truth, Goodness. Not yet written.'
    : 'End of spine. The withdrawal path begins here. Not yet written.';
  container.innerHTML += `
    <div class="node-card">
      <div class="terminal-msg">
        <span>${label}</span>
        ${msg}<br><br>
        Tags accumulated: ${state.tags.join(' · ')}
      </div>
    </div>`;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function restart() {
  state = { node: "spine_001", tags: [], transcendentals: [], artifacts: [], run_artifacts: [] };
  render();
}

// ─── INIT ──────────────────────────────────────────
render();
</script>
</body>
</html>
